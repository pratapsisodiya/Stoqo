services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stoqo
      POSTGRES_PASSWORD: stoqo
      POSTGRES_DB: stoqo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
